<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200">
  <defs>
    <linearGradient id="is-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#052e16" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="is-warehouse" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#22c55e" />
      <stop offset="1" stop-color="#16a34a" />
    </linearGradient>
    <linearGradient id="is-shopify" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#22c55e" />
      <stop offset="1" stop-color="#4ade80" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="480" height="200" rx="20" fill="url(#is-bg)" />

  <!-- Odoo warehouses (stacked isometric) -->
  <g transform="translate(60,54)">
    <!-- front warehouse -->
    <polygon points="0,30 40,6 110,6 70,30"
             fill="#020617" stroke="#22c55e" stroke-width="1.2" />
    <rect x="0" y="30" width="70" height="68"
          fill="url(#is-warehouse)" stroke="#16a34a" stroke-width="1.1" />
    <polygon points="70,30 110,6 110,74 70,98"
             fill="#020617" stroke="#16a34a" stroke-width="1.1" />
    <text x="10" y="52" font-size="10" fill="#ecfdf5">Warehouse A</text>

    <!-- shelf boxes -->
    <rect x="10" y="60" width="12" height="12"
          fill="#022c22" stroke="#bbf7d0" stroke-width="0.9" />
    <rect x="26" y="60" width="12" height="12"
          fill="#022c22" stroke="#bbf7d0" stroke-width="0.9" />
    <rect x="42" y="60" width="12" height="12"
          fill="#022c22" stroke="#bbf7d0" stroke-width="0.9" />

    <!-- second warehouse behind -->
    <g transform="translate(18,-22) scale(0.9)">
      <polygon points="0,30 40,6 110,6 70,30"
               fill="#020617" stroke="#22c55e" stroke-width="1.0" opacity="0.7" />
      <rect x="0" y="30" width="70" height="54"
            fill="#022c22" stroke="#16a34a" stroke-width="1.0" opacity="0.7" />
      <polygon points="70,30 110,6 110,60 70,84"
               fill="#020617" stroke="#16a34a" stroke-width="1.0" opacity="0.7" />
      <text x="10" y="50" font-size="8" fill="#bbf7d0">Warehouse B</text>
    </g>
  </g>

  <!-- Shopify locations -->
  <g transform="translate(290,58)">
    <polygon points="0,26 40,4 112,4 72,26"
             fill="#020617" stroke="#22c55e" stroke-width="1.2" />
    <rect x="0" y="26" width="72" height="64"
          fill="#020617" stroke="#4ade80" stroke-width="1.0" />
    <polygon points="72,26 112,4 112,68 72,90"
             fill="#020617" stroke="#4ade80" stroke-width="1.0" />
    <text x="10" y="46" font-size="10" fill="#bbf7d0">Shopify</text>
    <text x="10" y="60" font-size="9" fill="#bbf7d0">Locations</text>

    <rect x="10" y="68" width="44" height="10" rx="5" fill="#022c22" />
    <text x="32" y="75" font-size="7" fill="#6ee7b7" text-anchor="middle">
      US " EU
    </text>
  </g>

  <!-- Flow arrow -->
  <g>
    <path d="M180 112 C 220 112, 250 96, 290 96"
          fill="none" stroke="#bbf7d0" stroke-width="1.4" stroke-dasharray="5 4" />
    <polygon points="288,92 297,96 288,100" fill="#bbf7d0" />

    <text x="240" y="140" font-size="9" fill="#d1fae5" text-anchor="middle">
      Onhand quantities exported to mapped Shopify locations
    </text>
  </g>
</svg>

