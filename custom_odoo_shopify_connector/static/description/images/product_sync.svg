<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200">
  <defs>
    <linearGradient id="ps-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="ps-odoobox" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#a855f7" />
      <stop offset="1" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="ps-shopifybox" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#22c55e" />
      <stop offset="1" stop-color="#16a34a" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="480" height="200" rx="20" fill="url(#ps-bg)" />

  <!-- Odoo product block (isometric) -->
  <g transform="translate(70,70)">
    <polygon points="0,30 50,0 130,0 80,30"
             fill="#020617" stroke="#4f46e5" stroke-width="1.4" />
    <rect x="0" y="30" width="80" height="56"
          fill="url(#ps-odoobox)" stroke="#4f46e5" stroke-width="1.2" />
    <polygon points="80,30 130,0 130,56 80,86"
             fill="#020617" stroke="#4f46e5" stroke-width="1.2" />
    <text x="18" y="52" font-size="11" fill="#e5e7eb">Odoo</text>
    <text x="18" y="68" font-size="10" fill="#cbd5f5">Product</text>

    <!-- variant chips -->
    <rect x="10" y="76" width="10" height="10" rx="2"
          fill="#0f172a" stroke="#e5e7eb" stroke-width="0.8" />
    <rect x="26" y="76" width="10" height="10" rx="2"
          fill="#0f172a" stroke="#e5e7eb" stroke-width="0.8" />
    <rect x="42" y="76" width="10" height="10" rx="2"
          fill="#0f172a" stroke="#e5e7eb" stroke-width="0.8" />
  </g>

  <!-- Shopify product block (isometric) -->
  <g transform="translate(290,70)">
    <polygon points="0,30 50,0 130,0 80,30"
             fill="#020617" stroke="#22c55e" stroke-width="1.4" />
    <rect x="0" y="30" width="80" height="56"
          fill="url(#ps-shopifybox)" stroke="#22c55e" stroke-width="1.2" />
    <polygon points="80,30 130,0 130,56 80,86"
             fill="#020617" stroke="#22c55e" stroke-width="1.2" />
    <text x="16" y="52" font-size="11" fill="#e5e7eb">Shopify</text>
    <text x="16" y="68" font-size="10" fill="#bbf7d0">Product</text>

    <!-- published pill -->
    <rect x="10" y="76" width="44" height="12" rx="6" fill="#022c22" />
    <text x="32" y="85" font-size="8" fill="#6ee7b7" text-anchor="middle">
      Published
    </text>
  </g>

  <!-- Connector & queue -->
  <g>
    <line x1="170" y1="110" x2="240" y2="110"
          stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="4 3" />
    <polygon points="239,106 248,110 239,114" fill="#e5e7eb" />

    <line x1="240" y1="120" x2="170" y2="120"
          stroke="#6366f1" stroke-width="1" stroke-dasharray="3 3" opacity="0.7" />
    <polygon points="171,116 162,120 171,124"
             fill="#6366f1" opacity="0.7" />

    <rect x="210" y="80" width="60" height="32" rx="8"
          fill="#020617" stroke="#38bdf8" stroke-width="1.1" />
    <text x="240" y="98" font-size="9" fill="#e5e7eb" text-anchor="middle">
      Queue
    </text>

    <text x="240" y="150" font-size="9" fill="#9ca3af" text-anchor="middle">
      Variants " Images " Prices exported from Odoo to Shopify
    </text>
  </g>
</svg>

