<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220">
  <defs>
    <linearGradient id="wf-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="wf-layer1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#4f46e5" />
      <stop offset="1" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="wf-layer2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#22c55e" />
      <stop offset="1" stop-color="#16a34a" />
    </linearGradient>
    <linearGradient id="wf-layer3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06b6d4" />
      <stop offset="1" stop-color="#0ea5e9" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="480" height="220" rx="20" fill="url(#wf-bg)" />

  <!-- Layer 1 -->
  <g transform="translate(40,40)">
    <polygon points="0,36 60,6 260,6 200,36"
             fill="#020617" stroke="#4f46e5" stroke-width="1.2" />
    <rect x="0" y="36" width="200" height="54"
          fill="url(#wf-layer1)" stroke="#4f46e5" stroke-width="1.1" />
    <polygon points="200,36 260,6 260,60 200,90"
             fill="#020617" stroke="#4f46e5" stroke-width="1.1" />
    <text x="12" y="58" font-size="11" fill="#e5e7eb">
      Models &amp; Services
    </text>
    <text x="12" y="72" font-size="9" fill="#c7d2fe">
      Products " Orders " Customers " Inventory
    </text>
  </g>

  <!-- Layer 2 -->
  <g transform="translate(70,96)">
    <polygon points="0,32 54,4 250,4 196,32"
             fill="#020617" stroke="#22c55e" stroke-width="1.2" />
    <rect x="0" y="32" width="196" height="48"
          fill="url(#wf-layer2)" stroke="#16a34a" stroke-width="1.1" />
    <polygon points="196,32 250,4 250,56 196,84"
             fill="#020617" stroke="#16a34a" stroke-width="1.1" />
    <text x="12" y="54" font-size="11" fill="#ecfdf5">
      Queues &amp; Schedulers
    </text>
    <text x="12" y="68" font-size="9" fill="#bbf7d0">
      Background workers " Cron jobs
    </text>
  </g>

  <!-- Layer 3 -->
  <g transform="translate(100,148)">
    <polygon points="0,30 50,4 240,4 190,30"
             fill="#020617" stroke="#0ea5e9" stroke-width="1.2" />
    <rect x="0" y="30" width="190" height="46"
          fill="url(#wf-layer3)" stroke="#06b6d4" stroke-width="1.1" />
    <polygon points="190,30 240,4 240,52 190,76"
             fill="#020617" stroke="#06b6d4" stroke-width="1.1" />
    <text x="12" y="50" font-size="11" fill="#e0f2fe">
      Webhooks &amp; Mappers
    </text>
    <text x="12" y="64" font-size="9" fill="#bae6fd">
      Events ’ Odoo records / payloads
    </text>
  </g>

  <!-- Connectors -->
  <g stroke="#e5e7eb" stroke-width="1.4" stroke-dasharray="4 3">
    <line x1="190" y1="90" x2="200" y2="110" />
    <line x1="220" y1="138" x2="230" y2="160" />
  </g>

  <text x="240" y="24" font-size="9" fill="#9ca3af" text-anchor="middle">
    High-level connector architecture from models down to webhook events
  </text>
</svg>

