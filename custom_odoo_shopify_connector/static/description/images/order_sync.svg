<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200">
  <defs>
    <linearGradient id="os-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="os-shopify" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="os-odoo" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#a855f7" />
      <stop offset="1" stop-color="#ec4899" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="480" height="200" rx="20" fill="url(#os-bg)" />

  <!-- Shopify order slab -->
  <g transform="translate(40,64)">
    <polygon points="0,26 48,0 136,0 88,26"
             fill="#020617" stroke="#38bdf8" stroke-width="1.3" />
    <rect x="0" y="26" width="88" height="64"
          fill="url(#os-shopify)" stroke="#38bdf8" stroke-width="1.1" />
    <polygon points="88,26 136,0 136,64 88,90"
             fill="#020617" stroke="#38bdf8" stroke-width="1.1" />
    <text x="14" y="52" font-size="11" fill="#e5e7eb">Shopify</text>
    <text x="14" y="68" font-size="10" fill="#bae6fd">Order</text>
    <rect x="10" y="76" width="56" height="10" rx="5" fill="#0b1120" />
    <text x="38" y="83" font-size="7" fill="#e5e7eb" text-anchor="middle">
      #1001 " Paid
    </text>
  </g>

  <!-- Webhook tile -->
  <g transform="translate(190,70)">
    <polygon points="0,20 34,0 94,0 60,20"
             fill="#020617" stroke="#f97316" stroke-width="1.2" />
    <rect x="0" y="20" width="60" height="48" rx="8"
          fill="#020617" stroke="#f97316" stroke-width="1.1" />
    <polygon points="60,20 94,0 94,48 60,68"
             fill="#020617" stroke="#f97316" stroke-width="1.1" />
    <text x="12" y="42" font-size="9" fill="#fed7aa">Webhook</text>
    <text x="12" y="54" font-size="8" fill="#9ca3af">/order</text>
  </g>

  <!-- Odoo Sale Order slab -->
  <g transform="translate(310,64)">
    <polygon points="0,26 48,0 136,0 88,26"
             fill="#020617" stroke="#a855f7" stroke-width="1.3" />
    <rect x="0" y="26" width="88" height="64"
          fill="url(#os-odoo)" stroke="#a855f7" stroke-width="1.1" />
    <polygon points="88,26 136,0 136,64 88,90"
             fill="#020617" stroke="#a855f7" stroke-width="1.1" />
    <text x="16" y="52" font-size="11" fill="#fdf2ff">Odoo</text>
    <text x="16" y="68" font-size="10" fill="#f9a8d4">Sale Order</text>
    <rect x="10" y="76" width="60" height="10" rx="5" fill="#0b1120" />
    <text x="40" y="83" font-size="7" fill="#e5e7eb" text-anchor="middle">
      Picking " Invoice
    </text>
  </g>

  <!-- Flow arrows -->
  <g>
    <line x1="176" y1="110" x2="190" y2="98"
          stroke="#e5e7eb" stroke-width="1.4" stroke-dasharray="4 3" />
    <polygon points="189,94 196,100 187,102" fill="#e5e7eb" />

    <line x1="250" y1="98" x2="310" y2="98"
          stroke="#e5e7eb" stroke-width="1.4" stroke-dasharray="4 3" />
    <polygon points="309,94 318,98 309,102" fill="#e5e7eb" />

    <text x="240" y="160" font-size="9" fill="#9ca3af" text-anchor="middle">
      Webhook ’ Queue ’ Background job creates &amp; updates Odoo Sale Orders
    </text>
  </g>
</svg>

